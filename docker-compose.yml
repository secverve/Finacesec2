services:
  postgres:
    image: postgres:16-alpine
    container_name: fds-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fds-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: fds-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DEMO_USER_EMAIL: ${DEMO_USER_EMAIL}
      DEMO_USER_PASSWORD: ${DEMO_USER_PASSWORD}
      SECOND_USER_EMAIL: ${SECOND_USER_EMAIL}
      SECOND_USER_PASSWORD: ${SECOND_USER_PASSWORD}
      AUTO_SEED: ${AUTO_SEED}
      HIGH_AMOUNT_THRESHOLD: ${HIGH_AMOUNT_THRESHOLD}
      ABNORMAL_REGION_CODES: ${ABNORMAL_REGION_CODES}
      MULTI_ACCOUNT_WINDOW_MINUTES: ${MULTI_ACCOUNT_WINDOW_MINUTES}
      LOGIN_FAILURE_WINDOW_MINUTES: ${LOGIN_FAILURE_WINDOW_MINUTES}
      ORDER_SPIKE_MULTIPLIER: ${ORDER_SPIKE_MULTIPLIER}
      ORDER_CANCEL_BURST_THRESHOLD: ${ORDER_CANCEL_BURST_THRESHOLD}
      ORDER_CANCEL_WINDOW_MINUTES: ${ORDER_CANCEL_WINDOW_MINUTES}
      IMMEDIATE_ORDER_WINDOW_MINUTES: ${IMMEDIATE_ORDER_WINDOW_MINUTES}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL}
    container_name: fds-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:80"

volumes:
  postgres_data:
  redis_data:

